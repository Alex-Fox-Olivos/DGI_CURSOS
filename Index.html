<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0F1E">
  <meta name="description" content="Curso responsive Domina Claude — Dirección de Gestión de la Información">
  <title>Domina Claude — DGI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap');

    *,*::before,*::after{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0}
    body{overflow:hidden;background:#0A0F1E}
    button,input,select,textarea{font:inherit}
    button{touch-action:manipulation}
    :root{
      --bg:#0A0F1E;--bg2:#111827;--bg3:#1a2235;
      --orange:#D4845A;--violet:#7B6CF6;--green:#4ade80;--red:#ef4444;
      --text:#E8EAF0;--muted:#8B92A8;--border:#1e2d4a;--card:#131d33;
      --radius:10px;--sidebar:260px;--content:760px;
    }
    .sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
    .app{display:flex;width:100%;height:100vh;height:100dvh;min-height:480px;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;position:relative}
    .workspace{flex:1;min-width:0;display:flex;flex-direction:column;height:100%;overflow:hidden}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar);min-width:var(--sidebar);height:100%;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .28s ease,width .28s ease;z-index:30}
    .sidebar-header{padding:14px 12px 12px;border-bottom:1px solid var(--border)}
    .dgi-logo-wrap{min-height:52px;margin-bottom:10px;padding:8px;background:rgba(90,0,170,.12);border-radius:8px;border:1px solid rgba(90,0,170,.25);display:flex;align-items:center;justify-content:center}
    .dgi-logo{display:block;max-width:50%;object-fit:contain}
    .logo-fallback{display:none;width:50%;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:4px;color:#fff;background:linear-gradient(90deg,#5A00AA,#7B6CF6);border-radius:6px}
    .course-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12.5px;color:#fff;line-height:1.3}
    .progress-section{padding:9px 12px;border-bottom:1px solid var(--border)}
    .progress-label{font-size:10px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between}
    .progress-bar{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--orange));border-radius:99px;transition:width .35s ease}
    .nav-scroll{flex:1;overflow-y:auto;padding:4px 0 14px;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .nav-scroll::-webkit-scrollbar{width:4px}.nav-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .module-header{width:100%;border:0;background:transparent;padding:8px 12px;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:space-between;text-align:left}
    .module-header:hover,.module-header:focus-visible{color:var(--text);outline:none;background:rgba(255,255,255,.02)}
.module-header-main{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
    .module-index{
      flex:0 0 26px;width:26px;height:22px;border-radius:5px;
      display:inline-flex;align-items:center;justify-content:center;
      font-family:'Syne',sans-serif;font-size:11px;font-weight:800;
      color:#fff;background:rgba(123,108,246,.20);
      border:1px solid rgba(160,154,248,.32);line-height:1;opacity:1
    }
    .module-title-text{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .module-arrow{transition:transform .2s;font-size:9px}.module-arrow.open{transform:rotate(90deg)}
    .lesson-item{width:100%;border:0;background:transparent;padding:7px 12px 7px 24px;font-size:11.5px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:7px;transition:all .15s;border-left:2px solid transparent;min-height:38px;text-align:left}
    .lesson-item:hover,.lesson-item:focus-visible{color:var(--text);background:var(--bg3);outline:none}
    .lesson-item.active{color:var(--orange);border-left-color:var(--orange);background:rgba(212,132,90,.08)}
    .lesson-item.completed{color:var(--green)}
    .lesson-check{width:14px;height:14px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px}
    .lesson-item.completed .lesson-check{background:var(--green);border-color:var(--green);color:#0A0F1E}
    .lesson-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .premium-badge{font-size:8px;background:linear-gradient(90deg,var(--orange),#e8a87a);color:#fff;padding:2px 5px;border-radius:4px;font-weight:700;margin-left:auto;white-space:nowrap}

    /* TOPBAR */
    .topbar{display:none;align-items:center;gap:10px;padding:10px max(14px,env(safe-area-inset-right)) 10px max(14px,env(safe-area-inset-left));background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:20}
    .menu-btn{background:none;border:1px solid var(--border);color:var(--muted);width:38px;height:38px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .menu-btn:hover,.menu-btn:focus-visible{border-color:var(--violet);color:var(--text);outline:none}
    .topbar-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .topbar-prog{font-size:11px;color:var(--orange);font-weight:600;white-space:nowrap}
    .overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(2px);z-index:25}
    .overlay.show{display:block}

    /* MAIN */
    .main{flex:1;min-height:0;overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .main::-webkit-scrollbar{width:5px}.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px}
    .lesson-content{max-width:var(--content);padding:26px 28px 16px;margin:0 auto;width:100%}
    .lesson-eyebrow{font-size:10px;color:var(--violet);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
    .lesson-h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(21px,2.2vw,28px);color:#fff;line-height:1.2;margin:0 0 11px}
    .lesson-lead{font-size:13.5px;color:var(--muted);line-height:1.7;margin:0 0 20px;border-left:3px solid var(--violet);padding-left:12px}
    .content-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:13px}
    .card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#fff;margin-bottom:10px;display:flex;align-items:center;gap:7px}
    .card-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
    .icon-orange{background:rgba(212,132,90,.15);color:var(--orange)}.icon-violet{background:rgba(123,108,246,.15);color:var(--violet)}.icon-green{background:rgba(74,222,128,.1);color:var(--green)}
    .prose{font-size:13px;color:var(--muted);line-height:1.75}.prose p{margin:0 0 8px}.prose p:last-child{margin-bottom:0}.prose strong,.list-item strong,.step-body strong{color:var(--text);font-weight:600}
    .tip-pro,.premium-card{border-radius:var(--radius);padding:12px 15px;margin:13px 0}
    .tip-pro{background:rgba(123,108,246,.08);border:1px solid rgba(123,108,246,.25)}
    .premium-card{background:rgba(212,132,90,.06);border:1px solid rgba(212,132,90,.3)}
    .tip-label,.premium-label{font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}.tip-label{color:var(--violet)}.premium-label{color:var(--orange)}
    .tip-text{font-size:12.5px;color:var(--muted);line-height:1.65}
    .steps{margin:8px 0}.step{display:flex;gap:9px;margin-bottom:10px;align-items:flex-start}.step:last-child{margin-bottom:0}
    .step-num{width:22px;height:22px;border-radius:50%;background:var(--violet);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}.step-body{font-size:12.5px;color:var(--muted);line-height:1.6;min-width:0}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:10px 0;border-radius:8px}
    table.compare{width:100%;border-collapse:collapse;font-size:12px;min-width:420px}table.compare th{background:var(--bg3);color:var(--text);font-weight:600;padding:9px 10px;text-align:left;border-bottom:2px solid var(--violet);white-space:nowrap}table.compare td{padding:8px 10px;color:var(--muted);border-bottom:1px solid var(--border);font-size:11.5px}table.compare tr:last-child td{border-bottom:none}.highlight{color:var(--orange)!important;font-weight:500}.check{color:var(--green)!important}
    .model-badge{display:inline-block;padding:3px 7px;border-radius:4px;font-size:9.5px;font-weight:700}.badge-haiku{background:rgba(74,222,128,.12);color:var(--green)}.badge-sonnet{background:rgba(123,108,246,.15);color:var(--violet)}.badge-opus{background:rgba(212,132,90,.15);color:var(--orange)}
    .summary-box{background:var(--bg3);border-top:2px solid var(--violet);border-radius:0 0 var(--radius) var(--radius);padding:13px 16px;margin-top:20px}.summary-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:#fff;margin-bottom:7px}.summary-list{list-style:none;display:flex;flex-direction:column;gap:5px;padding:0;margin:0}.summary-list li{font-size:12px;color:var(--muted);display:flex;align-items:flex-start;gap:6px;line-height:1.5}.summary-list li::before{content:'→';color:var(--orange);flex-shrink:0}
    .list-items{display:flex;flex-direction:column;gap:7px;margin:8px 0}.list-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--muted);line-height:1.55}.list-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);flex-shrink:0;margin-top:7px}
    .apps-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin:10px 0}.app-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 12px;min-width:0}.app-card-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px}.app-card-desc{font-size:11px;color:var(--muted);line-height:1.5}
    .excel-prompt{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:11px 12px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;color:#a8d8b0;line-height:1.65;white-space:pre-wrap;word-break:break-word;margin-top:10px;overflow-x:auto}
    code{background:var(--bg3);padding:2px 5px;border-radius:4px;font-size:11px;overflow-wrap:anywhere}


    /* ══════════════════════════════════════════════════════
       PRESENTACIÓN DEL CURSO
       Adaptada a la portada visual solicitada
    ══════════════════════════════════════════════════════ */
    body.welcome-active .main{
      background:
        radial-gradient(circle at 50% -8%,rgba(123,108,246,.10),transparent 31%),
        radial-gradient(circle at 84% 18%,rgba(212,132,90,.06),transparent 24%),
        var(--bg);
    }
    body.welcome-active .dgi-footer{display:none}
    .lesson-content.welcome-content{max-width:980px;padding-top:34px;padding-bottom:48px}
    .course-welcome{width:100%;max-width:820px;margin:0 auto;text-align:center}
    .welcome-hero{max-width:680px;margin:0 auto}
    .welcome-mark{
      width:52px;height:52px;margin:0 auto 20px;border-radius:15px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(145deg,#E29A70,var(--orange));
      color:#fff;font-size:25px;line-height:1;
      box-shadow:0 14px 34px rgba(212,132,90,.18)
    }
    .welcome-heading{
      margin:0;font-family:'Syne',sans-serif;font-size:clamp(31px,5vw,47px);
      font-weight:800;letter-spacing:-1.1px;line-height:1.02;color:#F5F6FB
    }
    .welcome-heading .welcome-accent{color:var(--orange)}
    .welcome-description{
      max-width:600px;margin:15px auto 16px;color:var(--muted);
      font-size:13.5px;line-height:1.75
    }
    .welcome-description strong{color:var(--text);font-weight:600}
    .welcome-dgi-badge{
      min-height:30px;margin:0 auto 27px;display:flex;align-items:center;justify-content:center
    }
    .welcome-dgi-logo{display:block;width:88px;max-height:32px;object-fit:contain;opacity:.62}
    .welcome-dgi-fallback{
      display:none;align-items:center;justify-content:center;min-width:76px;height:27px;
      border:1px solid rgba(145,105,255,.28);border-radius:6px;
      color:#AFA4FF;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;
      letter-spacing:3px;opacity:.72
    }
    .welcome-stats{
      display:flex;align-items:flex-start;justify-content:center;gap:48px;
      margin:0 auto 31px
    }
    .welcome-stat{min-width:58px;text-align:center}
    .welcome-stat-value{
      font-family:'Syne',sans-serif;font-size:24px;font-weight:800;
      line-height:1;color:var(--orange)
    }
    .welcome-stat-label{margin-top:6px;color:#59617D;font-size:9.5px;line-height:1.25}

    .welcome-overview{
      max-width:760px;margin:0 auto 28px;padding:22px 24px;
      border:1px solid #28345C;border-radius:13px;background:#1A2143;
      text-align:left;box-shadow:0 16px 44px rgba(0,0,0,.10)
    }
    .welcome-block-title{
      display:flex;align-items:center;gap:7px;margin-bottom:11px;
      color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700
    }
    .welcome-overview-copy{
      margin:0 0 15px;color:#9BA3BD;font-size:11.5px;line-height:1.75
    }
    .welcome-outline{display:flex;flex-direction:column;gap:8px}
    .welcome-outline-item{display:flex;align-items:flex-start;gap:10px;min-width:0}
    .welcome-outline-num{
      width:32px;height:28px;flex:0 0 32px;border-radius:6px;
      display:inline-flex;align-items:center;justify-content:center;
      color:#FFFFFF!important;background:rgba(123,108,246,.24);
      border:1px solid rgba(160,154,248,.42);
      font-family:'Syne',sans-serif;font-size:14px;font-weight:800;
      line-height:1;opacity:1!important;text-shadow:0 1px 2px rgba(0,0,0,.35)
    }
    .welcome-outline-text{color:#A1A8BF;font-size:11px;line-height:1.55}
    .welcome-outline-text strong{color:#F0F2F8;font-weight:700}

    .welcome-benefits{max-width:760px;margin:0 auto 29px}
    .welcome-section-title{
      margin:0 0 13px;color:#fff;font-family:'Syne',sans-serif;
      font-size:13px;font-weight:700;text-align:center
    }
    .welcome-benefit-grid{
      display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px
    }
    .welcome-benefit-card{
      min-width:0;padding:16px 14px;border:1px solid #28345C;border-radius:10px;
      background:#1A2143;text-align:left;transition:transform .18s ease,border-color .18s ease
    }
    .welcome-benefit-card:hover{transform:translateY(-2px);border-color:rgba(123,108,246,.75)}
    .welcome-benefit-icon{margin-bottom:7px;font-size:17px;line-height:1}
    .welcome-benefit-title{
      margin-bottom:5px;color:#F1F3F9;font-size:10.5px;font-weight:700;line-height:1.35
    }
    .welcome-benefit-text{color:#929AB4;font-size:9.5px;line-height:1.55}

    .welcome-launch{
      max-width:760px;margin:0 auto;display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr) 176px;
      grid-template-rows:repeat(2,minmax(82px,auto));gap:10px;text-align:left
    }
    .welcome-module-card,.welcome-start-card{
      border:1px solid #28345C;border-radius:10px;cursor:pointer;
      transition:transform .18s ease,border-color .18s ease,filter .18s ease
    }
    .welcome-module-card{
      position:relative;display:flex;align-items:flex-start;gap:11px;
      width:100%;padding:15px 14px;background:#1A2143;color:inherit;text-align:left
    }
    .welcome-module-card:hover,.welcome-module-card:focus-visible{
      transform:translateY(-2px);border-color:var(--orange);outline:none
    }
    .welcome-module-num{
      width:36px;height:36px;flex:0 0 36px;border-radius:8px;
      display:inline-flex;align-items:center;justify-content:center;
      color:#FFFFFF!important;background:rgba(123,108,246,.25);
      border:1px solid rgba(160,154,248,.45);
      font-family:'Syne',sans-serif;font-size:15px;font-weight:800;
      line-height:1;opacity:1!important;text-shadow:0 1px 2px rgba(0,0,0,.35)
    }
    .welcome-module-info{min-width:0;flex:1;display:block;padding-top:1px}
    .welcome-module-title{
      display:block;color:#F7F8FC;font-size:10.5px;font-weight:700;
      line-height:1.4;margin:0 0 6px;overflow-wrap:anywhere
    }
    .welcome-module-meta{
      display:block;color:#A7AFC8;font-size:9px;line-height:1.4;
      overflow-wrap:anywhere
    }
    .welcome-start-card{
      grid-column:3;grid-row:1 / span 2;display:flex;align-items:center;justify-content:center;
      width:100%;padding:18px 14px;background:linear-gradient(150deg,#DE8C61,#C96F45);
      border-color:rgba(255,255,255,.07);color:#fff;font-size:12px;font-weight:700;
      line-height:1.45;text-align:center
    }
    .welcome-start-card:hover,.welcome-start-card:focus-visible{
      transform:translateY(-2px);filter:brightness(1.06);outline:2px solid rgba(212,132,90,.30);outline-offset:2px
    }

    @media(max-width:680px){
      .lesson-content.welcome-content{padding-top:26px;padding-bottom:34px}
      .welcome-heading{font-size:34px}
      .welcome-description{font-size:12.5px}
      .welcome-overview{padding:20px}
      .welcome-stats{gap:38px}
      .welcome-launch{grid-template-columns:minmax(0,1fr) minmax(0,1fr) 148px}
    }
    @media(max-width:520px){
      .lesson-content.welcome-content{padding:22px 9px 28px}
      .welcome-mark{width:44px;height:44px;border-radius:12px;margin-bottom:17px;font-size:21px}
      .welcome-heading{font-size:29px;letter-spacing:-.8px}
      .welcome-description{max-width:345px;margin-top:12px;font-size:10.5px;line-height:1.7}
      .welcome-dgi-badge{margin-bottom:21px}
      .welcome-dgi-logo{width:74px;max-height:26px}
      .welcome-stats{gap:36px;margin-bottom:25px}
      .welcome-stat-value{font-size:20px}
      .welcome-stat-label{font-size:8px}
      .welcome-overview{padding:17px 16px;margin-bottom:22px;border-radius:10px}
      .welcome-block-title{font-size:11px}
      .welcome-overview-copy{font-size:9.5px;line-height:1.65;margin-bottom:13px}
      .welcome-outline{gap:6px}
      .welcome-outline-num{width:28px;height:25px;flex-basis:28px;font-size:12px}
      .welcome-outline-text{font-size:9px;line-height:1.5}
      .welcome-benefits{margin-bottom:22px}
      .welcome-section-title{font-size:11px;margin-bottom:11px}
      .welcome-benefit-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}
      .welcome-benefit-card{padding:12px 10px;border-radius:8px}
      .welcome-benefit-icon{font-size:14px;margin-bottom:6px}
      .welcome-benefit-title{font-size:8.5px;margin-bottom:4px}
      .welcome-benefit-text{font-size:7.7px;line-height:1.48}
      .welcome-launch{
        grid-template-columns:minmax(0,1fr) minmax(0,1fr) 91px;
        grid-template-rows:repeat(2,minmax(63px,auto));gap:7px
      }
      .welcome-module-card{padding:12px 10px;gap:7px;border-radius:8px}
      .welcome-module-num{width:30px;height:30px;flex-basis:30px;font-size:12px}
      .welcome-module-title{font-size:8.5px;margin-bottom:3px}
      .welcome-module-meta{font-size:7.4px}
      .welcome-start-card{padding:12px 8px;border-radius:8px;font-size:9px}
    }
    @media(max-width:380px){
      .welcome-heading{font-size:27px}
      .welcome-description{font-size:10px}
      .welcome-benefit-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .welcome-benefit-text{font-size:8.4px}
      .welcome-launch{grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:auto}
      .welcome-start-card{grid-column:1 / -1;grid-row:auto;min-height:54px;font-size:10px}
    }

    /* QUIZ */

      {icon:'🔍',tone:'orange',title:'Comparación práctica',table:[['Criterio','Claude','Otros asistentes'],['Trabajo documental','Muy sólido','Variable según modelo'],['Instrucciones complejas','Alta consistencia','Variable'],['Contexto largo','Adecuado para expedientes','Depende de la plataforma'],['Uso institucional','Fuerte con reglas claras','Requiere configuración equivalente']]}

    m1l2:{eyebrow:'Módulo 1 · Lección 2.2',title:'Interfaz y funciones básicas',lead:'La interfaz parece simple, pero concentra herramientas para adjuntar archivos, organizar conversaciones, producir artefactos y cambiar el modo de trabajo.',sections:[
      {icon:'🗂️',tone:'violet',title:'Anatomía de la interfaz',items:['<strong>Panel lateral:</strong> historial, proyectos y configuración.','<strong>Área de conversación:</strong> instrucciones, respuestas y archivos.','<strong>Panel de artefactos:</strong> contenido reutilizable como código, documentos o HTML.','<strong>Barra de entrada:</strong> texto, adjuntos y herramientas disponibles.']},
      {icon:'⚙️',tone:'orange',title:'Funciones esenciales',steps:['<strong>Adjuntar archivos:</strong> agrega PDF, CSV, DOCX o imágenes para analizarlos.','<strong>Seleccionar capacidad:</strong> elige el modelo o modo disponible según la tarea.','<strong>Regenerar o continuar:</strong> solicita una alternativa o profundización.','<strong>Editar el mensaje:</strong> corrige la instrucción y crea una nueva rama de trabajo.']}
    ],tip:['💡 Tip Pro','Edita el mensaje original cuando quieras probar una variante del prompt sin perder la estructura de la conversación.'],summary:['Los archivos amplían el contexto disponible','Los artefactos separan el producto final del chat','Editar mensajes facilita la iteración controlada']},

    m1l3:{eyebrow:'Módulo 1 · Lección 2.3',title:'Modelos: Haiku, Sonnet y Opus',lead:'La familia de modelos ofrece distintos equilibrios entre velocidad, costo y profundidad. La disponibilidad exacta depende del plan y de la fecha.',sections:[
      {icon:'📊',tone:'orange',title:'Guía de selección',table:[['Modelo','Perfil','Mejor para'],['<span class="model-badge badge-haiku">Haiku</span>','Muy rápido','Clasificación, extracción, alto volumen'],['<span class="model-badge badge-sonnet">Sonnet</span>','Equilibrado','Análisis, redacción y código'],['<span class="model-badge badge-opus">Opus</span>','Profundo','Estrategia y problemas complejos']]},
      {icon:'🎯',tone:'violet',title:'Aplicación DGI',items:['<strong>Haiku:</strong> etiquetado, normalización y tareas repetitivas.','<strong>Sonnet:</strong> trabajo general, informes, SQL y análisis de datos.','<strong>Opus:</strong> razonamiento profundo, revisión estratégica y síntesis compleja.']}

    m1l4:{eyebrow:'Módulo 1 · Lección 2.4',title:'Apps: web, escritorio y móvil',lead:'Usar la plataforma adecuada reduce fricción y permite incorporar la IA en distintos momentos del trabajo.',apps:[['🌐 Web','Entorno completo para proyectos, archivos y trabajo profundo'],['💻 Escritorio','Acceso rápido y trabajo junto a aplicaciones locales'],['📱 Móvil','Consultas, voz, fotos y seguimiento en campo'],['🔌 API','Integración con sistemas y procesos automatizados']],tip:['💡 Recomendación','Usa la web para análisis intensivo, escritorio para trabajo continuo y móvil para captura o consulta rápida.'],summary:['Cada canal responde a un contexto distinto','La experiencia puede variar por sistema operativo y plan','La API es la opción para integraciones controladas']},

    m2l1:{eyebrow:'Módulo 2 · Lección 3.1',title:'Organizar el trabajo en Proyectos',lead:'Un proyecto reúne instrucciones, documentos de referencia y conversaciones relacionadas para mantener un contexto de trabajo coherente.',sections:[

    ],tip:['💡 Cómo solicitarlo','Indica el tipo de producto, su audiencia, estructura, validaciones y criterios de aceptación.'],summary:['El artefacto es reutilizable y autónomo','La especificación detallada mejora el resultado','Revisa siempre fórmulas, enlaces y dependencias']},

      {icon:'📋',tone:'green',title:'Prompt para tabla auditable DGI',code:`Necesito una tabla Excel con:\n\nPROPÓSITO: Registro de expedientes — [MES/AÑO]\n\nCOLUMNAS:\n- ID_Expediente\n- Área_Responsable\n- Fecha_Ingreso\n- Fecha_Cierre\n- Días_Hábiles\n- Estado\n- Cumple_Plazo\n\nVALIDACIONES:\n- Fórmulas operativas y referenciadas\n- Catálogos para campos cerrados\n- Hoja de auditoría y controles de totales\n- Sin referencias rotas ni valores #REF!\n\nESTILO DGI:\n- Encabezados institucionales\n- Tabla estructurada\n- Congelar paneles\n- Filtros y formatos consistentes`}

  function escapeAttr(value){return String(value).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function allItems(){const items=[];MODULES.forEach(m=>{items.push(...m.lessons);if(m.quiz)items.push({id:`${m.id}-q`,title:`Quiz: ${m.title}`,isQuiz:true,moduleId:m.id})});return items}
  function moduleForItem(id){if(id==='i1')return'intro';return id.split('-')[0].split('l')[0]}
  function isMobile(){return window.matchMedia('(max-width:520px)').matches}

  function saveState(){
    try{localStorage.setItem('dgi-course-progress',JSON.stringify({current:state.current,done:[...state.done],answers:state.answers,open:state.open}))}catch(_e){}
  }
  function loadState(){
    try{const raw=localStorage.getItem('dgi-course-progress');if(!raw)return;const saved=JSON.parse(raw);if(saved.current)state.current=saved.current;if(Array.isArray(saved.done))state.done=new Set(saved.done);if(saved.answers)state.answers=saved.answers;if(saved.open)state.open={...state.open,...saved.open}}catch(_e){}
  }

  function toggleSidebar(force){
    const sidebar=document.getElementById('sidebar');
    const overlay=document.getElementById('overlay');
    const btn=document.getElementById('menu-btn');
    const shouldOpen=typeof force==='boolean'?force:!sidebar.classList.contains('open');
    sidebar.classList.toggle('open',shouldOpen);
    overlay.classList.toggle('show',shouldOpen);
    overlay.setAttribute('aria-hidden',String(!shouldOpen));
    btn.setAttribute('aria-expanded',String(shouldOpen));
    btn.setAttribute('aria-label',shouldOpen?'Cerrar menú':'Abrir menú');
  }

  function renderNav(){
    const nav=document.getElementById('nav-scroll');
    nav.innerHTML='';
    MODULES.forEach((module,moduleIndex)=>{
      const group=document.createElement('section');
      const header=document.createElement('button');
      // La secuencia comienza en 01 para Introducción y continúa hasta 05.
      const moduleNumber=String(moduleIndex+1).padStart(2,'0');
      header.type='button';header.className='module-header';header.setAttribute('aria-expanded',String(Boolean(state.open[module.id])));
      header.innerHTML=`<span class="module-header-main"><span class="module-index">${moduleNumber}</span><span class="module-title-text">${module.title}</span></span><span class="module-arrow ${state.open[module.id]?'open':''}">▶</span>`;
      header.addEventListener('click',()=>{state.open[module.id]=!state.open[module.id];saveState();renderNav()});
      group.appendChild(header);

      if(state.open[module.id]){
        module.lessons.forEach(lesson=>group.appendChild(createNavItem(lesson)));
        if(module.quiz)group.appendChild(createNavItem({id:`${module.id}-q`,title:'🧪 Quiz'}));
      }
      nav.appendChild(group);
    });

    const total=allItems().length;
    const completed=[...state.done].filter(id=>allItems().some(item=>item.id===id)).length;
    const pct=Math.round((completed/total)*100);
    document.getElementById('prog-pct').textContent=`${pct}%`;
    document.getElementById('prog-bar').style.width=`${pct}%`;
    document.getElementById('topbar-prog').textContent=`${pct}%`;
    document.getElementById('progress-accessible').setAttribute('aria-valuenow',String(pct));
  }

  function createNavItem(item){
    const button=document.createElement('button');
    button.type='button';
    button.className=`lesson-item${item.id===state.current?' active':''}${state.done.has(item.id)?' completed':''}`;
    const lesson=allItems().find(x=>x.id===item.id);
    button.innerHTML=`<span class="lesson-check">${state.done.has(item.id)?'✓':''}</span><span class="lesson-label">${item.title}</span>${lesson&&lesson.premium?'<span class="premium-badge">PRO</span>':''}`;
    button.addEventListener('click',()=>goTo(item.id));
    return button;
  }

  function sectionHTML(section){
    const tone=icons[section.tone]||'icon-violet';
    let content='';
    if(section.paragraphs)content=`<div class="prose">${section.paragraphs.map(p=>`<p>${p}</p>`).join('')}</div>`;
    if(section.items)content=`<div class="list-items">${section.items.map(item=>`<div class="list-item"><span class="list-dot"></span><span>${item}</span></div>`).join('')}</div>`;
    if(section.steps)content=`<div class="steps">${section.steps.map((step,index)=>`<div class="step"><span class="step-num">${index+1}</span><div class="step-body">${step}</div></div>`).join('')}</div>`;
    if(section.table){const [head,...rows]=section.table;content=`<div class="table-wrap"><table class="compare"><thead><tr>${head.map(cell=>`<th>${cell}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${row.map(cell=>`<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
    if(section.code)content=`<div class="excel-prompt">${escapeAttr(section.code)}</div>`;
    return `<section class="content-card"><div class="card-title"><span class="card-icon ${tone}">${section.icon||'•'}</span>${section.title}</div>${content}</section>`;
  }

  }

  function lessonHTML(lesson){
    let html=`<div class="lesson-eyebrow">${lesson.eyebrow}</div><h2 class="lesson-h1">${lesson.title}</h2><p class="lesson-lead">${lesson.lead}</p>`;
    if(lesson.premium)html+=`<div class="premium-card"><div class="premium-label">${lesson.premium[0]}</div><div class="tip-text">${lesson.premium[1]}</div></div>`;
    if(lesson.sections)html+=lesson.sections.map(sectionHTML).join('');
    if(lesson.apps)html+=`<div class="apps-grid">${lesson.apps.map(([title,desc])=>`<div class="app-card"><div class="app-card-title">${title}</div><div class="app-card-desc">${desc}</div></div>`).join('')}</div>`;
    if(lesson.tip)html+=`<div class="tip-pro"><div class="tip-label">${lesson.tip[0]}</div><div class="tip-text">${lesson.tip[1]}</div></div>`;
    if(lesson.summary)html+=`<div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list">${lesson.summary.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
    return html;
  }

  function navFooter(index){
    const items=allItems();
    const prev=index>0?items[index-1]:null;
    const next=index<items.length-1?items[index+1]:null;
    return `<div class="bottom-bar"><div class="bottom-left">${prev?`<button class="btn-prev" type="button" data-go="${prev.id}">← Ant.</button>`:''}<span class="lesson-counter">${index+1} / ${items.length}</span></div><button class="btn-complete" type="button" data-complete="${next?next.id:''}">${state.done.has(state.current)?'✓ Lista':'Completar →'}</button></div>`;
  }

  function renderLesson(){
    const body=document.getElementById('lesson-body');
    const main=document.getElementById('main-area');
    const isWelcome=state.current==='i1';
    document.body.classList.toggle('welcome-active',isWelcome);
    body.classList.toggle('welcome-content',isWelcome);
    main.scrollTo({top:0,behavior:'auto'});
    if(state.current.endsWith('-q')){renderQuiz(state.current.replace('-q',''));return}
    const items=allItems();
    const index=items.findIndex(item=>item.id===state.current);
    const item=items[index]||items[0];
    const lesson=LESSONS[item.content]||LESSONS.intro;
    document.getElementById('topbar-title').textContent=item.title;
    if(item.content==='intro'){
      body.innerHTML=welcomeHTML();
      wireFooter();
      document.title=`${item.title} — DGI`;
      return;
    }
    body.innerHTML=lessonHTML(lesson)+navFooter(index);
    wireFooter();
    document.title=`${item.title} — DGI`;
  }

  function renderQuiz(moduleId){
    const quiz=QUIZZES[moduleId];
    const body=document.getElementById('lesson-body');
    const items=allItems();
    const quizId=`${moduleId}-q`;
    const index=items.findIndex(item=>item.id===quizId);
    document.getElementById('topbar-title').textContent=quiz.title;
    let html=`<div class="lesson-eyebrow">Verificación de conocimiento</div><h2 class="lesson-h1">${quiz.title}</h2><section class="quiz-section"><div class="quiz-title">Pon a prueba lo aprendido</div><div class="quiz-sub">3 preguntas · Selecciona una respuesta</div>`;
    quiz.questions.forEach((question,i)=>{
      const key=`${moduleId}-${i}`;
      const answer=state.answers[key];
      html+=`<div class="quiz-q"><div class="quiz-q-text">${i+1}. ${question.q}</div><div class="quiz-options">`;
      question.opts.forEach((option,optionIndex)=>{
        let className='quiz-opt';
        if(answer!==undefined){
          if(optionIndex===question.correct)className+=' reveal-correct';
          if(answer===optionIndex&&optionIndex!==question.correct)className+=' selected-wrong';
          if(answer===optionIndex&&optionIndex===question.correct)className+=' selected-correct';
        }
        html+=`<button class="${className}" type="button" data-answer="${moduleId}|${i}|${optionIndex}" ${answer!==undefined?'disabled':''}>${String.fromCharCode(65+optionIndex)}. ${option}</button>`;
      });
      if(answer!==undefined)html+=`<div class="quiz-feedback ${answer===question.correct?'correct':'wrong'}">${answer===question.correct?'✓ Correcto. ':'✗ Incorrecto. '}${question.exp}</div>`;
      html+='</div></div>';
    });
    html+='</section>';
    const allAnswered=quiz.questions.every((_,i)=>state.answers[`${moduleId}-${i}`]!==undefined);
    const prev=index>0?items[index-1]:null;
    const next=index<items.length-1?items[index+1]:null;
    html+=`<div class="bottom-bar"><div class="bottom-left">${prev?`<button class="btn-prev" type="button" data-go="${prev.id}">← Ant.</button>`:''}</div>${allAnswered?`<button class="btn-complete" type="button" data-complete="${next?next.id:''}">${state.done.has(quizId)?'✓ Continuar':'Continuar →'}</button>`:`<span class="lesson-counter">Responde todas para continuar</span>`}</div>`;
    body.innerHTML=html;
    body.querySelectorAll('[data-answer]').forEach(button=>button.addEventListener('click',()=>{
      const [mid,qIndex,optIndex]=button.dataset.answer.split('|');
      state.answers[`${mid}-${qIndex}`]=Number(optIndex);saveState();renderLesson();
    }));
    wireFooter();
    document.title=`${quiz.title} — DGI`;
  }

  function wireFooter(){
    document.querySelectorAll('[data-go]').forEach(button=>button.addEventListener('click',()=>goTo(button.dataset.go)));
    document.querySelectorAll('[data-complete]').forEach(button=>button.addEventListener('click',()=>complete(button.dataset.complete)));
  }

  function complete(nextId){
    state.done.add(state.current);
    if(nextId){state.current=nextId;const moduleId=moduleForItem(nextId);state.open[moduleId]=true}
    saveState();renderNav();renderLesson();
  }

  function goTo(id){
    state.current=id;
    const moduleId=moduleForItem(id);state.open[moduleId]=true;
    if(isMobile())toggleSidebar(false);
    saveState();renderNav();renderLesson();
    document.getElementById('main-area').focus({preventScroll:true});
  }

  document.getElementById('menu-btn').addEventListener('click',()=>toggleSidebar());
  document.getElementById('overlay').addEventListener('click',()=>toggleSidebar(false));
  document.addEventListener('keydown',event=>{if(event.key==='Escape')toggleSidebar(false)});
  window.addEventListener('resize',()=>{if(!isMobile())toggleSidebar(false)});

  loadState();
  if(!allItems().some(item=>item.id===state.current))state.current='i1';
  renderNav();
  renderLesson();
  </script>
</body>
</html>
