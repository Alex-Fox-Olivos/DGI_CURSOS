.apps-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:9px 0}
.app-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.app-card-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}

.excel-prompt{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:monospace;font-size:11px;color:#a8d8b0;line-height:1.7;white-space:pre-wrap;word-break:break-word;margin-top:10px;overflow-x:auto}

}

<h1 class="lesson-h1">Domina Claude:<br>De cero a experto</h1>
<p class="lesson-lead">Una IA que no sabes usar es ruido, no ventaja. Este curso transforma esa brecha en diferencial real: dominarás Claude desde sus fundamentos hasta agentes autónomos, con aplicación directa a los flujos de la DGI.</p>
<div class="content-card"><div class="card-title"><div class="card-icon icon-orange">🎯</div>¿Por qué este curso?</div><div class="prose"><p>Claude no es solo un chatbot. Es un sistema de razonamiento con contexto extendido, herramientas de automatización, integración con tus apps de trabajo y capacidad de actuar como agente autónomo.</p><p>Quien lo domine <strong>toma mejores decisiones, con más información, en menos tiempo.</strong></p></div></div>
<div class="apps-grid"><div class="app-card"><div class="app-card-title">📚 4 módulos</div><div class="app-card-desc">Desde la interfaz básica hasta agentes autónomos</div></div><div class="app-card"><div class="app-card-title">⚡ 22 lecciones</div><div class="app-card-desc">Contenido práctico orientado a la DGI</div></div><div class="app-card"><div class="app-card-title">🧪 4 Quizzes</div><div class="app-card-desc">Verificación al final de cada módulo</div></div><div class="app-card"><div class="app-card-title">🏆 Certificado</div><div class="app-card-desc">Obtén tu certificado DGI al completar</div></div></div>
<div class="tip-pro"><div class="tip-label">💡 Cómo aprovechar el curso</div><div class="tip-text">Navega en orden la primera vez. Luego usa el menú lateral para acceder a secciones de referencia cuando lo necesites. Marca lecciones completadas para rastrear tu progreso.</div></div>
<div class="summary-box"><div class="summary-title">Al finalizar podrás:</div><ul class="summary-list"><li>Seleccionar el modelo correcto según la tarea</li><li>Crear artefactos, tablas y visualizaciones</li><li>Integrar Claude en Chrome, Word, Excel y PowerPoint</li><li>Diseñar Skills y Conectores para tu equipo</li><li>Configurar agentes y automatizaciones autónomas</li></ul></div>`,

m1l1:`<div class="lesson-eyebrow">Módulo 1 · Lección 2.1</div>
<h1 class="lesson-h1">¿Qué es Claude y qué lo hace diferente?</h1>
<p class="lesson-lead">Claude fue diseñado para ser útil, inofensivo y honesto desde su arquitectura. No es solo marketing — es una diferencia de diseño fundamental.</p>
<div class="content-card"><div class="card-title"><div class="card-icon icon-violet">⚖️</div>Ventajas diferenciales</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>200K tokens de contexto:</strong> Procesa documentos largos y múltiples archivos sin perder coherencia.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Razonamiento estructurado:</strong> Explicita su proceso de pensamiento, auditable en decisiones críticas.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Honestidad calibrada:</strong> Señala incertidumbres y reduce el riesgo de alucinaciones confiadas.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Seguimiento preciso de instrucciones:</strong> Respeta formatos, restricciones y roles de forma consistente.</span></div></div></div>
<div class="content-card"><div class="card-title"><div class="card-icon icon-orange">🔍</div>Claude vs. el mercado</div><div class="table-wrap"><table class="compare"><thead><tr><th>Criterio</th><th>Claude</th><th>GPT-4o</th><th>Gemini</th></tr></thead><tbody><tr><td>Honestidad</td><td class="check">★★★★★</td><td>★★★☆☆</td><td>★★★☆☆</td></tr><tr><td>Instrucciones</td><td class="check">★★★★★</td><td>★★★★☆</td><td>★★★☆☆</td></tr><tr><td>Contexto largo</td><td class="check">200K</td><td>128K</td><td>1M exp.</td></tr><tr><td>Office/Drive</td><td class="highlight">Nativa DGI</td><td>Plugins</td><td>Google WS</td></tr></tbody></table></div></div>
<div class="tip-pro"><div class="tip-label">💡 Tip Pro</div><div class="tip-text">Para análisis de documentos institucionales extensos (normativas, expedientes, informes), Claude es consistentemente superior. Un documento de 150 páginas cabe completo en una sola conversación.</div></div>
<div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Claude prioriza honestidad y razonamiento auditable</li><li>200K tokens permite trabajar con documentos extensos completos</li><li>Seguimiento preciso de instrucciones: ideal para flujos DGI estandarizados</li></ul></div>`,

m1l2:`<div class="lesson-eyebrow">Módulo 1 · Lección 2.2</div>
<h1 class="lesson-h1">Interfaz de Claude y funciones básicas</h1>
<p class="lesson-lead">La interfaz es minimalista por diseño, pero esconde capas de funcionalidad que la mayoría de usuarios nunca descubre.</p>
<div class="content-card"><div class="card-title"><div class="card-icon icon-violet">🗂️</div>Anatomía de la interfaz</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>Panel lateral izquierdo:</strong> Historial, proyectos y configuración.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Área de chat central:</strong> Zona principal con soporte Markdown, código y artefactos.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Panel de artefactos (derecha):</strong> Aparece automáticamente para contenido estructurado.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Barra de entrada:</strong> Soporta archivos (PDF, CSV, imágenes) y selección de modelo.</span></div></div></div>
<div class="content-card"><div class="card-title"><div class="card-icon icon-orange">⚙️</div>Funciones esenciales</div><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-body"><strong>Adjuntar archivos:</strong> Ícono clip → PDFs, CSV, DOCX, imágenes. Claude razona sobre el contenido.</div></div><div class="step"><div class="step-num">2</div><div class="step-body"><strong>Cambiar modelo:</strong> Barra inferior → selector de modelo (Haiku, Sonnet, Opus).</div></div><div class="step"><div class="step-num">3</div><div class="step-body"><strong>Regenerar respuesta:</strong> Ícono ↺ para una alternativa sin reescribir el prompt.</div></div><div class="step"><div class="step-num">4</div><div class="step-body"><strong>Editar mensajes:</strong> Lápiz sobre cualquier mensaje tuyo → edita y crea una rama alternativa.</div></div></div></div>
<div class="tip-pro"><div class="tip-label">💡 Tip Pro</div><div class="tip-text">Usa la edición de mensajes (lápiz) en lugar de reescribir prompts desde cero. Mantiene el contexto y es más eficiente para iterar.</div></div>
<div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>El panel de artefactos aparece automáticamente para contenido estructurado</li><li>Adjuntar archivos activa capacidades de análisis documental avanzado</li><li>Editar mensajes previos permite iterar sin perder el contexto</li></ul></div>`,

m1l3:`<div class="lesson-eyebrow">Módulo 1 · Lección 2.3</div>
<h1 class="lesson-h1">Modelos: Haiku, Sonnet y Opus</h1>
<p class="lesson-lead">Elegir el modelo correcto es una decisión estratégica. Cada uno tiene un perfil de velocidad, costo y capacidad diferente.</p>
<div class="content-card"><div class="card-title"><div class="card-icon icon-orange">📊</div>Tabla comparativa</div><div class="table-wrap"><table class="compare"><thead><tr><th>Modelo</th><th>Velocidad</th><th>Mejor para</th></tr></thead><tbody><tr><td><span class="model-badge badge-haiku">Haiku</span></td><td class="check">⚡ Muy rápido</td><td>Volumen, clasificación, formato</td></tr><tr><td><span class="model-badge badge-sonnet">Sonnet</span></td><td>🔄 Rápido</td><td>Análisis, redacción, código</td></tr><tr><td><span class="model-badge badge-opus">Opus</span></td><td>⏳ Pausado</td><td>Razonamiento profundo, estrategia</td></tr></tbody></table></div></div>
<div class="content-card"><div class="card-title"><div class="card-icon icon-violet">🎯</div>Guía de selección DGI</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>Haiku:</strong> Automatizaciones de alto volumen, etiquetar docs, extraer campos de formularios.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Sonnet:</strong> Informes, análisis de datos, código. <em>Modelo de uso general recomendado.</em></span></div><div class="list-item"><div class="list-dot"></div><span><strong>Opus:</strong> Análisis estratégico, normativas, síntesis de documentos extensos.</span></div></div></div>
<div class="premium-card"><div class="premium-label">⭐ Premium</div><div class="tip-text">Opus tiene cuota mensual en plan Pro. Monitorea tu uso en <strong>Configuración → Uso</strong> para evitar interrupciones en flujos críticos.</div></div>
<div class="tip-pro"><div class="tip-label">💡 Regla 80/20</div><div class="tip-text">El 80% de las tareas DGI se resuelven con Sonnet. Reserva Opus para análisis que requieren máxima profundidad. Haiku para todo lo repetitivo y de alto volumen.</div></div>
<div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Haiku = velocidad · Sonnet = equilibrio ideal · Opus = máxima profundidad</li><li>Sonnet es el modelo de trabajo diario recomendado para la DGI</li><li>Monitorea el uso de Opus para evitar límites en momentos críticos</li></ul></div>`,

m1l5:`<div class="lesson-eyebrow">Módulo 1 · Lección 2.5</div>
<h1 class="lesson-h1">Configuración de Claude</h1>
<p class="lesson-lead">La configuración es donde Claude pasa de asistente genérico a colaborador personalizado. El paso que la mayoría omite y que hace toda la diferencia.</p>
<div class="content-card"><div class="card-title"><div class="card-icon icon-orange">⚙️</div>Configuración esencial</div><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-body"><strong>Instrucciones personalizadas:</strong> Configuración → Instrucciones. Define rol, contexto, formato y restricciones permanentes.</div></div><div class="step"><div class="step-num">2</div><div class="step-body"><strong>Idioma y tono:</strong> Español formal o informal. Puedes especificar terminología técnica de la DGI.</div></div><div class="step"><div class="step-num">3</div><div class="step-body"><strong>Privacidad:</strong> Configura si Claude puede usar tus conversaciones para mejorar el modelo.</div></div><div class="step"><div class="step-num">4</div><div class="step-body"><strong>Integraciones:</strong> Activa Google Drive, Slack, Notion u otras herramientas conectadas.</div></div></div></div>
<div class="tip-pro"><div class="tip-label">💡 Instrucción DGI recomendada</div><div class="tip-text"><em>"Soy especialista en la Dirección de Gestión de la Información. Respuestas en español formal, con encabezados, orientadas a documentación institucional y terminología técnica del sector."</em></div></div>
<div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Las instrucciones personalizadas aplican en todas las conversaciones</li><li>Define idioma, tono y contexto institucional desde el inicio</li><li>Revisa privacidad antes de compartir información sensible</li></ul></div>`,

m2l1:`<div class="lesson-eyebrow">Módulo 2 · Lección 3.1</div>
<h1 class="lesson-h1">Organizar el trabajo en Proyectos</h1>
<p class="lesson-lead">Los Proyectos transforman a Claude de un chat individual en un sistema de trabajo con memoria contextual persistente.</p>
<div class="content-card"><div class="card-title"><div class="card-icon icon-violet">📁</div>¿Qué es un Proyecto?</div><div class="prose"><p>Un Proyecto combina: <strong>instrucciones persistentes</strong>, <strong>documentos de referencia</strong> (disponibles en todas las conversaciones) e <strong>historial relacionado</strong>.</p></div></div>
<div class="content-card"><div class="card-title"><div class="card-icon icon-orange">🏗️</div>Crear un Proyecto DGI</div><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-body"><strong>Crear:</strong> Panel lateral → "Nuevo Proyecto" → Nombre descriptivo.</div></div><div class="step"><div class="step-num">2</div><div class="step-body"><strong>Instrucciones:</strong> Define el rol específico de Claude para el proyecto.</div></div><div class="step"><div class="step-num">3</div><div class="step-body"><strong>Documentos base:</strong> Sube normativas, plantillas DGI, glosarios institucionales.</div></div><div class="step"><div class="step-num">4</div><div class="step-body"><strong>Usar:</strong> Cada nueva conversación hereda el contexto completo automáticamente.</div></div></div></div>
<div class="tip-pro"><div class="tip-label">💡 Proyectos por área</div><div class="tip-text">Crea proyectos separados: "Gestión Documental", "Informes de Gestión", "Normativa Interna". Cada uno tiene su Claude especializado, sin re-explicar contexto.</div></div>
<div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Los Proyectos mantienen contexto, documentos e instrucciones persistentes</li><li>Ideales para flujos recurrentes con contexto especializado</li><li>Los documentos subidos están disponibles en todas sus conversaciones</li></ul></div>`,

m2l2:`<div class="lesson-eyebrow">Módulo 2 · Lección 3.2</div>
<h1 class="lesson-h1">Artefactos: ¿Qué son y cómo se crean?</h1>
<p class="lesson-lead">Los Artefactos son la diferencia entre recibir una respuesta y recibir un producto terminado listo para usar.</p>
<div class="content-card"><div class="card-title"><div class="card-icon icon-violet">📦</div>Tipos de Artefactos</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>Código:</strong> Python, JS, SQL con syntax highlighting y copia directa.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Documentos Markdown:</strong> Informes, memorandos, plantillas estructuradas.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>HTML interactivo:</strong> Dashboards, formularios, visualizaciones funcionales.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>SVG:</strong> Gráficos vectoriales, diagramas editables.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Datos estructurados:</strong> CSV compatible con Excel.</span></div></div></div>
<div class="tip-pro"><div class="tip-label">💡 Cómo forzar un Artefacto</div><div class="tip-text">Añade al final de tu prompt: <em>"Estructura la respuesta como artefacto con encabezados, tabla de indicadores y sección de recomendaciones."</em></div></div>
<div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Los artefactos son contenido autónomo en panel separado, listos para usar</li><li>Soportan código, documentos, HTML, SVG y datos estructurados</li><li>Mencionar "como artefacto" en el prompt garantiza este formato</li></ul></div>`,

m2l3:`<div class="lesson-eyebrow">Módulo 2 · Lección 3.3 <span class="premium-badge">PREMIUM</span></div>
<h1 class="lesson-h1">Artefactos: Excel y visualizaciones</h1>
<p class="lesson-lead">Claude genera tablas Excel con fórmulas auditables y dashboards listos para el flujo de trabajo de la DGI.</p>
<div class="premium-card"><div class="premium-label">⭐ Capacidad Premium</div><div class="tip-text">Requiere plan Pro o Teams con modelo Sonnet u Opus para máxima calidad.</div></div>
<div class="content-card"><div class="card-title"><div class="card-icon icon-green">📋</div>Prompt para tabla Excel auditable DGI</div>
<div class="excel-prompt">Necesito una tabla Excel (CSV) con:

PROPÓSITO: Registro de expedientes — [MES/AÑO]

COLUMNAS:
- ID_Expediente (EXP-AAAA-NNN)
- Área_Responsable (texto)
- Fecha_Ingreso (DD/MM/AAAA)
- Fecha_Cierre (DD/MM/AAAA)
- Días_Hábiles (=DIAS.LAB(C2,D2))
- Estado (Completado/En proceso/Pendiente)
- Cumple_Plazo (=SI(E2<=15,"Sí","No"))

TOTALES: CONTARA, PROMEDIO, CONTAR.SI

ESTILO DGI:
- Header: fondo #1A0033, texto blanco
- Línea inferior header: #5A00AA
- Sin gridlines · Altura fila: 20pt

Incluye 5 filas ejemplo y comentarios de auditoría.</div></div>
<div class="tip-pro"><div class="tip-label">💡 Para dashboards HTML</div><div class="tip-text">"Crea un artefacto HTML con 3 KPI cards (expedientes recibidos, procesados, pendientes) y gráfico de barras mensual en paleta DGI (#1A0033, #5A00AA, #9169FF)."</div></div>
<div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Especifica propósito, columnas tipadas y fórmulas en el prompt</li><li>Incluir estándares DGI garantiza consistencia visual</li><li>Los comentarios de auditoría facilitan revisión y mantenimiento</li></ul></div>`,

m2l6:`<div class="lesson-eyebrow">Módulo 2 · Lección 3.6 <span class="premium-badge">PREMIUM</span></div>
<h1 class="lesson-h1">MS Office: Casos de uso</h1>
<p class="lesson-lead">Con Claude integrado, los documentos dejan de ser estáticos. Genera, revisa, reestructura y explica contenido directamente en tu app.</p>
<div class="content-card"><div class="card-title"><div class="card-icon icon-orange">📝</div>Word: Casos DGI</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>Revisión de estilo:</strong> "Revisa tono formal y consistencia terminológica según estándares DGI".</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Generar secciones:</strong> "Redacta las conclusiones basándote en el documento abierto".</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Resúmenes ejecutivos:</strong> "Genera un resumen de 150 palabras del informe actual".</span></div></div></div>
<div class="content-card"><div class="card-title"><div class="card-icon icon-violet">📊</div>Excel: Casos DGI</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>Explicar fórmulas:</strong> Selecciona celda → "Explica qué hace esta fórmula y cómo modificarla".</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Detectar anomalías:</strong> "Señala filas con datos inconsistentes o fuera de rango".</span></div></div></div>
<div class="tip-pro"><div class="tip-label">💡 Contexto completo</div><div class="tip-text">Claude lee el documento completo, no solo el texto seleccionado. Puedes preguntar "¿hay inconsistencias entre la introducción y las conclusiones?" sin seleccionar nada.</div></div>
<div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Word: revisión de estilo, generación de secciones y resúmenes ejecutivos</li><li>Excel: explicación de fórmulas, generación y detección de anomalías</li><li>Claude lee el documento completo, no solo el texto seleccionado</li></ul></div>`,

m3l1:`<div class="lesson-eyebrow">Módulo 3 · Lección 4.1 <span class="premium-badge">PREMIUM</span></div><h1 class="lesson-h1">¿Qué son las Skills?</h1><p class="lesson-lead">Las Skills son instrucciones encapsuladas que convierten a Claude en un especialista personalizado. Defines la especialización una vez y la usas siempre.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-violet">🧩</div>Anatomía de una Skill</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>Instrucciones del sistema:</strong> Rol, restricciones y comportamiento base de Claude.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Conocimiento de referencia:</strong> Documentos y glosarios siempre disponibles.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Ejemplos de formato:</strong> Modelos de respuesta que Claude replica.</span></div></div></div><div class="tip-pro"><div class="tip-label">💡 Skills como perfiles de trabajo</div><div class="tip-text">Una Skill "Analista DGI" tiene contexto institucional y formato de informes. Una "Redactor Normativo" tiene el estilo legal. Cambias de Skill como cambias de herramienta.</div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Las Skills encapsulan rol, conocimiento y formato en perfil reutilizable</li><li>Eliminan la necesidad de repetir contexto en cada conversación</li><li>Cada área DGI puede tener su propia Skill especializada</li></ul></div>`,

m3l2:`<div class="lesson-eyebrow">Módulo 3 · Lección 4.2 <span class="premium-badge">PREMIUM</span></div><h1 class="lesson-h1">Instalar y usar Skills</h1><p class="lesson-lead">Las Skills se descubren en la biblioteca, se instalan con un clic y se activan con @NombreSkill desde cualquier conversación.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-orange">⬇️</div>Instalar una Skill</div><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-body">claude.ai → <strong>Skills</strong> en el menú lateral.</div></div><div class="step"><div class="step-num">2</div><div class="step-body">Explora por categoría: Productividad, Análisis, Redacción, Código.</div></div><div class="step"><div class="step-num">3</div><div class="step-body">Selecciona → <strong>"Instalar"</strong> → queda en tu biblioteca personal.</div></div><div class="step"><div class="step-num">4</div><div class="step-body">Para activar: escribe <strong>@NombreSkill</strong> en el chat.</div></div></div></div><div class="tip-pro"><div class="tip-label">💡 Skills combinadas</div><div class="tip-text">Puedes activar múltiples Skills con @Skill1 @Skill2. Claude combina ambos contextos. Útil para combinar conocimiento normativo con formato ejecutivo.</div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Skills disponibles en biblioteca oficial y compartidas por el equipo</li><li>Se activan con @NombreSkill en cualquier conversación</li><li>Es posible combinar múltiples Skills simultáneamente</li></ul></div>`,

m3l3:`<div class="lesson-eyebrow">Módulo 3 · Lección 4.3 <span class="premium-badge">PREMIUM</span></div><h1 class="lesson-h1">Cómo funcionan las habilidades</h1><p class="lesson-lead">Cuando activas una Skill, Claude recibe su contexto antes de tu mensaje. Un briefing completo instantáneo.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-violet">🔄</div>Flujo técnico</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>1. Activación:</strong> Mencionas @Skill o la seleccionas en el selector.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>2. Inyección:</strong> Instrucciones y documentos se prependen automáticamente.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>3. Respuesta:</strong> Claude responde con el rol, tono y formato definidos.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>4. Persistencia:</strong> La Skill permanece activa durante toda la conversación.</span></div></div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>La Skill inyecta contexto de forma transparente antes de cada respuesta</li><li>Persiste durante toda la conversación una vez activada</li><li>Claude especializado sin esfuerzo de configuración manual</li></ul></div>`,

m3l4:`<div class="lesson-eyebrow">Módulo 3 · Lección 4.4 <span class="premium-badge">PREMIUM</span></div><h1 class="lesson-h1">Crear tu propia Skill</h1><p class="lesson-lead">Crear una Skill para la DGI convierte a Claude en un miembro funcional con el conocimiento institucional de tu organización.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-orange">🛠️</div>Crear Skill paso a paso</div><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-body">Skills → <strong>"Nueva Skill"</strong> → Nombre y descripción.</div></div><div class="step"><div class="step-num">2</div><div class="step-body"><strong>Instrucciones:</strong> Rol, restricciones y formato de respuesta. Sé específico.</div></div><div class="step"><div class="step-num">3</div><div class="step-body"><strong>Documentos:</strong> Normativas, plantillas, glosario institucional.</div></div><div class="step"><div class="step-num">4</div><div class="step-body"><strong>Ejemplos few-shot:</strong> Muestra a Claude cómo se ve una respuesta ideal.</div></div><div class="step"><div class="step-num">5</div><div class="step-body"><strong>Prueba y ajusta</strong> hasta comportamiento consistente.</div></div></div></div><div class="tip-pro"><div class="tip-label">💡 Patrón de instrucciones</div><div class="tip-text"><strong>ROL</strong> + <strong>CONTEXTO</strong> + <strong>RESTRICCIONES</strong> + <strong>FORMATO</strong>. Ejemplo: "Eres analista DGI. Siempre cita el artículo normativo. Responde con: Análisis, Riesgo, Recomendación."</div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Estructura: nombre → instrucciones → documentos → ejemplos → prueba</li><li>El patrón ROL+CONTEXTO+RESTRICCIONES+FORMATO produce las mejores instrucciones</li><li>Itera hasta que la Skill se comporte de forma consistente</li></ul></div>`,

m3l5:`<div class="lesson-eyebrow">Módulo 3 · Lección 4.5 <span class="premium-badge">PREMIUM</span></div><h1 class="lesson-h1">Editar habilidades</h1><p class="lesson-lead">Las Skills evolucionan con tu práctica. Edítalas para añadir conocimiento actualizado sin crear una nueva desde cero.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-violet">✏️</div>Editar una Skill</div><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-body">Skills → selecciona la Skill → ícono de <strong>lápiz</strong>.</div></div><div class="step"><div class="step-num">2</div><div class="step-body">Modifica instrucciones, actualiza documentos o añade ejemplos.</div></div><div class="step"><div class="step-num">3</div><div class="step-body">Guarda → aplica en la siguiente conversación donde se active.</div></div></div></div><div class="tip-pro"><div class="tip-label">💡 Versionado</div><div class="tip-text">Antes de editar una Skill que funciona bien, crea una copia con sufijo "_v2". Compara comportamientos y revierte si los cambios no mejoran.</div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Las ediciones aplican a nuevas conversaciones, no a las activas</li><li>Copias versionadas evitan pérdidas de configuraciones que funcionaban</li><li>Refinar iterativamente las instrucciones es clave para alta precisión</li></ul></div>`,

m3l6:`<div class="lesson-eyebrow">Módulo 3 · Lección 4.6 <span class="premium-badge">PREMIUM</span></div><h1 class="lesson-h1">Personalizar habilidades</h1><p class="lesson-lead">La personalización avanzada incluye variables dinámicas, comportamientos condicionales y niveles de formalidad por contexto.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-orange">⚡</div>Técnicas avanzadas</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>Variables dinámicas:</strong> Placeholders como [AREA] o [TIPO_DOCUMENTO] que el usuario completa al activar.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Reglas condicionales:</strong> "Si el documento es normativo, cita artículos. Si es operativo, usa pasos numerados."</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Niveles de formalidad:</strong> Define cuándo usar lenguaje técnico vs. ejecutivo según el contexto del prompt.</span></div></div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Variables dinámicas hacen la Skill adaptable a múltiples contextos</li><li>Reglas condicionales aumentan la precisión situacional</li><li>La personalización avanzada convierte una Skill en un sistema de respuesta inteligente</li></ul></div>`,

m3l7:`<div class="lesson-eyebrow">Módulo 3 · Lección 4.7 <span class="premium-badge">PREMIUM</span></div><h1 class="lesson-h1">¿Qué son los Conectores?</h1><p class="lesson-lead">Los Conectores (MCP) permiten a Claude acceder y actuar sobre herramientas externas en tiempo real: bases de datos, nube, sistemas de gestión y más.</p><div class="apps-grid"><div class="app-card"><div class="app-card-title">☁️ Google Drive</div><div class="app-card-desc">Busca, lee y crea archivos desde el chat</div></div><div class="app-card"><div class="app-card-title">📧 Gmail/Outlook</div><div class="app-card-desc">Lee y redacta correos con contexto</div></div><div class="app-card"><div class="app-card-title">📋 Notion</div><div class="app-card-desc">Actualiza bases de conocimiento</div></div><div class="app-card"><div class="app-card-title">✅ Asana/Trello</div><div class="app-card-desc">Crea y gestiona tareas desde el chat</div></div></div><div class="tip-pro"><div class="tip-label">💡 Tip Pro</div><div class="tip-text">Con Drive conectado: "Busca todos los informes Q1 y genera un resumen comparativo" — Claude ejecuta la búsqueda y el análisis en un solo paso.</div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Conectores = acceso a herramientas externas reales vía MCP</li><li>Habilitan acciones concretas: buscar, leer, crear, actualizar en sistemas externos</li><li>Se configuran en Configuración → Conectores</li></ul></div>`,

m3l8:`<div class="lesson-eyebrow">Módulo 3 · Lección 4.8 <span class="premium-badge">PREMIUM</span></div><h1 class="lesson-h1">Complementos personales</h1><p class="lesson-lead">Conectores MCP configurados para tus propios repositorios o APIs institucionales, más allá de las integraciones predefinidas.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-orange">🔧</div>Configurar complemento personal</div><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-body">Configuración → <strong>Conectores → Añadir MCP personalizado.</strong></div></div><div class="step"><div class="step-num">2</div><div class="step-body">URL del servidor MCP o comando de inicio local.</div></div><div class="step"><div class="step-num">3</div><div class="step-body">Configura credenciales (API key, OAuth o autenticación básica).</div></div><div class="step"><div class="step-num">4</div><div class="step-body">Prueba la conexión → verifica qué herramientas expone.</div></div></div></div><div class="tip-pro"><div class="tip-label">💡 Tip Pro DGI</div><div class="tip-text">Si la DGI tiene sistema documental propio con API, un servidor MCP lo expone a Claude: "¿Cuáles son los expedientes pendientes esta semana?" — Claude consulta el sistema real.</div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Los complementos conectan Claude con sistemas propios via MCP</li><li>Requieren URL del servidor y credenciales de acceso</li><li>Habilitan acceso en lenguaje natural a repositorios institucionales</li></ul></div>`,

m4l1:`<div class="lesson-eyebrow">Módulo 4 · Lección 5.1</div><h1 class="lesson-h1">Claude Code</h1><p class="lesson-lead">La CLI de Anthropic que convierte a Claude en un desarrollador autónomo. Opera directamente en tu repositorio.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-violet">💻</div>Instalación</div><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-body">Requisito: <strong>Node.js 18+</strong> instalado.</div></div><div class="step"><div class="step-num">2</div><div class="step-body"><code style="background:var(--bg3);padding:2px 5px;border-radius:4px;font-size:11px">npm install -g @anthropic-ai/claude-code</code></div></div><div class="step"><div class="step-num">3</div><div class="step-body">Navega a tu proyecto y ejecuta <code style="background:var(--bg3);padding:2px 5px;border-radius:4px;font-size:11px">claude</code>.</div></div><div class="step"><div class="step-num">4</div><div class="step-body">Autentica con tu cuenta Anthropic.</div></div></div></div><div class="content-card"><div class="card-title"><div class="card-icon icon-orange">🎯</div>Casos DGI</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>Scripts de procesamiento:</strong> "Procesa todos los PDFs de /expedientes y genera un CSV con metadatos".</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Automatización de reportes:</strong> "Refactoriza el script para incluir validación y manejo de errores".</span></div></div></div><div class="tip-pro"><div class="tip-label">💡 Usa /init primero</div><div class="tip-text">Ejecuta <strong>/init</strong> para que Claude analice tu repositorio completo y cree un CLAUDE.md con el contexto del proyecto. Mejora drásticamente la calidad de las sugerencias.</div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Claude Code opera autónomamente en tu repositorio desde la terminal</li><li>Usa /init para que Claude entienda el contexto antes de comenzar</li><li>Ideal para automatización de scripts e integración de datos institucionales</li></ul></div>`,

m4l2:`<div class="lesson-eyebrow">Módulo 4 · Lección 5.2</div><h1 class="lesson-h1">Plugins en Claude</h1><p class="lesson-lead">Los plugins amplían las capacidades nativas con búsqueda en tiempo real, ejecución de código y análisis de datos avanzado.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-violet">🔌</div>Tipos de Plugins</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>Búsqueda web:</strong> Acceso a información en tiempo real con fuentes actuales.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Ejecución de código:</strong> Python directamente en la conversación para calcular, graficar y procesar.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Análisis de archivos:</strong> PDFs, imágenes y datasets complejos.</span></div></div></div><div class="tip-pro"><div class="tip-label">💡 Tip Pro</div><div class="tip-text">Con el plugin de código activo, Claude puede cargar tu CSV, calcular indicadores y generar gráficos directamente en la conversación, sin abrir Python o Excel.</div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Los plugins expanden las capacidades de Claude más allá del texto</li><li>Búsqueda web = respuestas con información actualizada</li><li>Ejecución de código = análisis estadístico en tiempo real</li></ul></div>`,

m4l3:`<div class="lesson-eyebrow">Módulo 4 · Lección 5.3</div><h1 class="lesson-h1">Tareas programadas</h1><p class="lesson-lead">Claude ejecuta acciones de forma autónoma en horarios definidos o bajo condiciones específicas, sin que el usuario esté presente.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-orange">⏰</div>Configurar una tarea</div><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-body">claude.ai → <strong>Tareas → Nueva tarea programada.</strong></div></div><div class="step"><div class="step-num">2</div><div class="step-body">Define el <strong>trigger</strong>: hora, frecuencia o evento.</div></div><div class="step"><div class="step-num">3</div><div class="step-body">Escribe el prompt de la tarea.</div></div><div class="step"><div class="step-num">4</div><div class="step-body">Define el <strong>destino</strong>: correo, Drive, Slack.</div></div></div></div><div class="content-card"><div class="card-title"><div class="card-icon icon-violet">💡</div>Casos DGI</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>Reporte semanal:</strong> Cada lunes 8am → resumen de expedientes pendientes → correo al equipo.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Monitoreo normativo:</strong> Semanalmente busca actualizaciones y alerta si hay cambios relevantes.</span></div></div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Las tareas programadas automatizan flujos recurrentes sin intervención manual</li><li>Combinan triggers temporales con acciones sobre herramientas conectadas</li><li>Ideales para reportes periódicos y monitoreo automatizado</li></ul></div>`,

m4l4:`<div class="lesson-eyebrow">Módulo 4 · Lección 5.4</div><h1 class="lesson-h1">¿Cómo funcionan los Agentes?</h1><p class="lesson-lead">Un Agente es Claude con capacidad de planificar, ejecutar e iterar autónomamente para completar tareas complejas sin intervención constante.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-violet">🤖</div>Arquitectura de un Agente</div><div class="list-items"><div class="list-item"><div class="list-dot"></div><span><strong>Planificación:</strong> Recibe el objetivo y genera un plan de pasos concretos.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Ejecución:</strong> Cada paso puede invocar conectores, ejecutar código o buscar información.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Evaluación:</strong> Revisa el resultado de cada paso y ajusta el plan si es necesario.</span></div><div class="list-item"><div class="list-dot"></div><span><strong>Entrega:</strong> Al completar todos los pasos, entrega el resultado final.</span></div></div></div><div class="tip-pro"><div class="tip-label">💡 Cómo formular objetivos efectivos</div><div class="tip-text">En vez de "busca información", usa: "Investiga las últimas 3 actualizaciones de la Ley X, extrae los cambios relevantes para la DGI y genera un resumen ejecutivo de una página."</div></div><div class="summary-box"><div class="summary-title">Resumen</div><ul class="summary-list"><li>Agentes: planifican → ejecutan → evalúan → entregan autónomamente</li><li>Más efectivos con objetivos bien definidos y proceso abierto</li><li>Combinan múltiples herramientas en flujos de trabajo complejos</li></ul></div>`,

m4l5:`<div class="lesson-eyebrow">Módulo 4 · Lección 5.5</div><h1 class="lesson-h1">Crear Agentes en Claude</h1><p class="lesson-lead">Diseñar un agente efectivo requiere definir claramente su objetivo, las herramientas disponibles y los criterios de éxito.</p><div class="content-card"><div class="card-title"><div class="card-icon icon-orange">🏗️</div>Crear un Agente</div><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-body"><strong>Define el objetivo:</strong> Específico. "Generar informe mensual de gestión documental con datos de Drive, indicadores y recomendaciones."</div></div><div class="step"><div class="step-num">2</div><div class="step-body"><strong>Selecciona herramientas:</strong> Qué Conectores necesita (Drive, Excel, correo).</div></div><div class="step"><div class="step-num">3</div><div class="step-body"><strong>Criterios de entrega:</strong> Formato, destinatario, estructura esperada.</div></div><div class="step"><div class="step-num">4</div><div class="step-body"><strong>Supervisa las primeras ejecuciones</strong> para validar comportamiento.</div></div><div class="step"><div class="step-num">5</div><div class="step-body"><strong>Automatiza</strong> convirtiéndolo en tarea programada recurrente.</div></div></div></div><div class="premium-card"><div class="premium-label">⭐ Premium</div><div class="tip-text">Agentes multi-herramienta y ejecuciones extendidas requieren plan Teams o Enterprise.</div></div><div class="tip-pro"><div class="tip-label">💡 Agente de informes DGI</div><div class="tip-text">"Cada primer lunes del mes: accede a 'Expedientes Q' en Drive, cuenta documentos por estado, calcula indicadores, genera el informe en plantilla DGI y envíalo al equipo directivo." — Un agente elimina horas de trabajo manual recurrente.</div></div><div class="summary-box"><div class="summary-title">🏆 ¡Curso completado!</div><ul class="summary-list"><li>Los agentes combinan todo lo aprendido: modelos, herramientas, conectores y automatización</li><li>Ciclo: definir → ejecutar → validar → automatizar</li><li>Con agentes bien diseñados, la DGI automatiza flujos de alto valor</li><li>Completa todos los quizzes para obtener tu certificado DGI</li></ul></div>`
};

let cur='i1',done=new Set(),qA={},open={intro:true,m1:true,m2:false,m3:false,m4:false};

function allL(){let a=[];MODULES.forEach(m=>{a=a.concat(m.lessons);if(m.quiz)a.push({id:m.id+'-q',title:'Quiz: '+m.title,isQ:true,mid:m.id})});return a}

function isMobile(){return window.innerWidth<=520}

function toggleSidebar(){
  const s=document.getElementById('sidebar');
  const o=document.getElementById('overlay');
  if(s.classList.contains('open')){s.classList.remove('open');o.classList.remove('show')}
  else{s.classList.add('open');o.classList.add('show')}
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function renderNav(){
  const nav=document.getElementById('nav-scroll');nav.innerHTML='';
  MODULES.forEach(m=>{
    const mg=document.createElement('div');
    const mh=document.createElement('div');mh.className='module-header';
    mh.innerHTML=`<span>${m.title}</span><span class="module-arrow ${open[m.id]?'open':''}">▶</span>`;
    mh.onclick=()=>{open[m.id]=!open[m.id];renderNav()};mg.appendChild(mh);
    if(open[m.id]){
      m.lessons.forEach(l=>{
        const li=document.createElement('div');
        li.className='lesson-item'+(l.id===cur?' active':'')+(done.has(l.id)?' completed':'');
        li.innerHTML=`<div class="lesson-check">${done.has(l.id)?'✓':''}</div><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.title}</span>${l.premium?'<span class="premium-badge">PRO</span>':''}`;
        li.onclick=()=>{cur=l.id;if(isMobile())closeSidebar();renderNav();renderLesson()};mg.appendChild(li);
      });
      if(m.quiz){
        const qid=m.id+'-q';
        const qi=document.createElement('div');
        qi.className='lesson-item'+(qid===cur?' active':'')+(done.has(qid)?' completed':'');
        qi.innerHTML=`<div class="lesson-check">${done.has(qid)?'✓':''}</div><span style="flex:1">🧪 Quiz</span>`;
        qi.onclick=()=>{cur=qid;if(isMobile())closeSidebar();renderNav();renderLesson()};mg.appendChild(qi);
      }
    }
    nav.appendChild(mg);
  });
  const al=allL(),pct=Math.round((done.size/al.length)*100);
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('topbar-prog').textContent=pct+'%';
}

function renderLesson(){
  const body=document.getElementById('lesson-body');
  document.getElementById('main-area').scrollTop=0;
  if(cur.endsWith('-q')){renderQuiz(cur.replace('-q',''));return}
  const al=allL(),idx=al.findIndex(l=>l.id===cur);
  const prev=idx>0?al[idx-1]:null,next=idx<al.length-1?al[idx+1]:null;
  const l=al[idx];
  const key=l?l.content:null;
  const title=l?l.title:'';
  document.getElementById('topbar-title').textContent=title||'Domina Claude: DGI';
  body.innerHTML=(key&&C[key]?C[key]:`<div class="lesson-eyebrow">Próximamente</div><h1 class="lesson-h1">Lección en desarrollo</h1><p class="lesson-lead">Este contenido estará disponible pronto.</p>`)+
  `<div class="bottom-bar"><div style="display:flex;gap:8px;align-items:center">${prev?`<button class="btn-prev" onclick="goTo('${prev.id}')">← Ant.</button>`:'<span></span>'}<span class="lesson-counter">${idx+1} / ${al.length}</span></div><button class="btn-complete" onclick="complete('${next?next.id:''}')">${done.has(cur)?'✓ Lista':'Completar →'}</button></div>`;
}

function renderQuiz(mid){
  const body=document.getElementById('lesson-body');
  const q=QUIZZES[mid];if(!q){body.innerHTML='<h1 class="lesson-h1">Quiz próximamente</h1>';return}
  document.getElementById('topbar-title').textContent=q.title;
  const al=allL(),qid=mid+'-q',idx=al.findIndex(l=>l.id===qid);
  const prev=idx>0?al[idx-1]:null,next=idx<al.length-1?al[idx+1]:null;
  let h=`<div class="lesson-eyebrow">Verificación de conocimiento</div><h1 class="lesson-h1">${q.title}</h1><div class="quiz-section"><div class="quiz-title">Pon a prueba lo aprendido</div><div class="quiz-sub">3 preguntas · Selecciona la respuesta correcta</div>`;
  q.questions.forEach((qi,i)=>{
    const k=mid+'-'+i,ans=qA[k];
    h+=`<div class="quiz-q"><div class="quiz-q-text">${i+1}. ${qi.q}</div><div class="quiz-options">`;
    qi.opts.forEach((o,oi)=>{
      let cls='quiz-opt';
      if(ans!==undefined){if(oi===qi.correct)cls+=' reveal-correct';if(ans===oi&&oi!==qi.correct)cls+=' selected-wrong';if(ans===oi&&oi===qi.correct)cls+=' selected-correct';}
      h+=`<button class="${cls}" ${ans!==undefined?'style="pointer-events:none"':''} onclick="ansQ('${mid}',${i},${oi})">${String.fromCharCode(65+oi)}. ${o}</button>`;
    });
    if(ans!==undefined)h+=`<div class="quiz-feedback ${ans===qi.correct?'correct':'wrong'}">${ans===qi.correct?'✓ Correcto. ':'✗ Incorrecto. '}${qi.exp}</div>`;
    h+=`</div></div>`;
  });
  const allAns=q.questions.every((_,i)=>qA[mid+'-'+i]!==undefined);
  h+=`</div><div class="bottom-bar"><div style="display:flex;gap:8px;align-items:center">${prev?`<button class="btn-prev" onclick="goTo('${prev.id}')">← Ant.</button>`:'<span></span>'}</div>${allAns?`<button class="btn-complete" onclick="complete('${next?next.id:''}')">Continuar →</button>`:`<span style="font-size:11px;color:var(--muted)">Responde todas para continuar</span>`}</div>`;
  body.innerHTML=h;
}

function ansQ(mid,i,oi){qA[mid+'-'+i]=oi;renderLesson()}
function complete(nxt){done.add(cur);if(nxt){cur=nxt;const mid=cur.split('-')[0];if(!open[mid])open[mid]=true}renderNav();renderLesson()}
function goTo(id){cur=id;const mid=id.split('-')[0];if(!open[mid])open[mid]=true;renderNav();renderLesson()}

renderNav();
renderLesson();
</script>
