let currentLessonId = 'intro-1';
let completedLessons = new Set();
let quizAnswers = {};
let openModules = {intro:true,m1:true,m2:false,m3:false,m4:false};

function getAllLessons(){
  let all=[];
  MODULES.forEach(m=>{all=all.concat(m.lessons);if(m.quiz)all.push({id:m.id+'-quiz',title:'Quiz: '+m.title,isQuiz:true,moduleId:m.id})});
  return all;
}

function renderNav(){
  const nav=document.getElementById('nav-scroll');
  nav.innerHTML='';
  MODULES.forEach(m=>{
    const mg=document.createElement('div');mg.className='module-group';
    const mh=document.createElement('div');mh.className='module-header';
    const arrow=openModules[m.id]?'▶':'▶';
    mh.innerHTML=`<span>${m.title}</span><span class="module-arrow ${openModules[m.id]?'open':''}">${arrow}</span>`;
    mh.onclick=()=>{openModules[m.id]=!openModules[m.id];renderNav()};
    mg.appendChild(mh);
    if(openModules[m.id]){
      m.lessons.forEach(l=>{
        const li=document.createElement('div');
        li.className='lesson-item'+(l.id===currentLessonId?' active':'')+(completedLessons.has(l.id)?' completed':'');
        const checkMark=completedLessons.has(l.id)?'✓':'';
        li.innerHTML=`<div class="lesson-check">${checkMark}</div>${l.title}${l.premium?'<span class="premium-badge">PRO</span>':''}`;
        li.onclick=()=>{currentLessonId=l.id;renderNav();renderLesson()};
        mg.appendChild(li);
      });
      if(m.quiz){
        const qid=m.id+'-quiz';
        const qi=document.createElement('div');
        qi.className='lesson-item'+(qid===currentLessonId?' active':'')+(completedLessons.has(qid)?' completed':'');
        qi.innerHTML=`<div class="lesson-check">${completedLessons.has(qid)?'✓':''}</div>🧪 Quiz: ${m.title}`;
        qi.onclick=()=>{currentLessonId=qid;renderNav();renderLesson()};
        mg.appendChild(qi);
      }
    }
    nav.appendChild(mg);
  });
  updateProgress();
}

function updateProgress(){
  const all=getAllLessons();
  const pct=Math.round((completedLessons.size/all.length)*100);
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-bar').style.width=pct+'%';
}

function renderLesson(){
  const body=document.getElementById('lesson-body');
  const main=document.getElementById('main-area');
  main.scrollTop=0;

  if(currentLessonId.endsWith('-quiz')){
    const moduleId=currentLessonId.replace('-quiz','');
    renderQuiz(moduleId);
    return;
  }

  const lesson=getAllLessons().find(l=>l.id===currentLessonId);
  const contentKey=lesson?lesson.content:null;
  const contentFn=contentKey&&CONTENT[contentKey];
  const html=contentFn?contentFn():`<div class="lesson-eyebrow">Próximamente</div><h1 class="lesson-h1">Esta lección está en desarrollo</h1><p class="lesson-lead">El contenido de esta lección estará disponible pronto.</p>`;

  const allLessons=getAllLessons();
  const idx=allLessons.findIndex(l=>l.id===currentLessonId);
  const prev=idx>0?allLessons[idx-1]:null;
  const next=idx<allLessons.length-1?allLessons[idx+1]:null;

  body.innerHTML=html+`
<div class="bottom-bar">
  <div style="display:flex;gap:8px;align-items:center">
    ${prev?`<button class="btn-prev" onclick="goTo('${prev.id}')">← Anterior</button>`:'<div></div>'}
    <span class="lesson-counter">${idx+1} / ${allLessons.length}</span>
  </div>
  <button class="btn-complete" onclick="completeAndNext('${next?next.id:''}')">
    ${completedLessons.has(currentLessonId)?'✓ Completada':'Completar y siguiente →'}
  </button>
</div>`;
}

function renderQuiz(moduleId){
  const body=document.getElementById('lesson-body');
  const quiz=QUIZZES[moduleId];
  if(!quiz){body.innerHTML=`<div class="lesson-eyebrow">Quiz</div><h1 class="lesson-h1">Quiz próximamente</h1>`;return;}

  let html=`<div class="lesson-eyebrow">Verificación de conocimiento</div><h1 class="lesson-h1">${quiz.title}</h1><div class="quiz-section"><div class="quiz-title">Pon a prueba lo aprendido</div><div class="quiz-sub">3 preguntas de opción múltiple · Selecciona la respuesta correcta</div>`;

  quiz.questions.forEach((q,qi)=>{
    const qKey=moduleId+'-'+qi;
    const ans=quizAnswers[qKey];
    html+=`<div class="quiz-q"><div class="quiz-q-text">${qi+1}. ${q.q}</div><div class="quiz-options">`;
    q.opts.forEach((opt,oi)=>{
      let cls='quiz-opt';
      if(ans!==undefined){
        if(oi===q.correct)cls+=' reveal-correct';
        if(ans===oi&&oi!==q.correct)cls+=' selected-wrong';
        if(ans===oi&&oi===q.correct)cls+=' selected-correct';
      }
      const disabled=ans!==undefined?'style="pointer-events:none"':'';
      html+=`<button class="${cls}" ${disabled} onclick="answerQuiz('${moduleId}',${qi},${oi})">${String.fromCharCode(65+oi)}. ${opt}</button>`;
    });
    if(ans!==undefined){
      const correct=ans===q.correct;
      html+=`<div class="quiz-feedback ${correct?'correct':'wrong'}">${correct?'✓ Correcto. ':'✗ Incorrecto. '}${q.exp}</div>`;
    }
    html+=`</div></div>`;
  });
  html+=`</div>`;

  const allLessons=getAllLessons();
  const qid=moduleId+'-quiz';
  const idx=allLessons.findIndex(l=>l.id===qid);
  const prev=idx>0?allLessons[idx-1]:null;
  const next=idx<allLessons.length-1?allLessons[idx+1]:null;

  const answered=quiz.questions.every((_,qi)=>quizAnswers[moduleId+'-'+qi]!==undefined);

  html+=`<div class="bottom-bar">
    <div style="display:flex;gap:8px;align-items:center">
      ${prev?`<button class="btn-prev" onclick="goTo('${prev.id}')">← Anterior</button>`:'<div></div>'}
    </div>
    ${answered?`<button class="btn-complete" onclick="completeAndNext('${next?next.id:''}')">Continuar →</button>`:`<span style="font-size:13px;color:var(--muted)">Responde todas las preguntas para continuar</span>`}
  </div>`;

  body.innerHTML=html;
}

function answerQuiz(moduleId,qi,oi){
  quizAnswers[moduleId+'-'+qi]=oi;
  renderLesson();
}

function completeAndNext(nextId){
  completedLessons.add(currentLessonId);
  if(nextId){
    currentLessonId=nextId;
    const moduleId=currentLessonId.split('-')[0];
    if(!openModules[moduleId])openModules[moduleId]=true;
  }
  renderNav();
  renderLesson();
}

function goTo(id){
  currentLessonId=id;
  const moduleId=id.split('-')[0];
  if(!openModules[moduleId])openModules[moduleId]=true;
  renderNav();
  renderLesson();
}

renderNav();
renderLesson();
</script>
